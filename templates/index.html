<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speech to Text</title>
  <style>
    /* ─── Reset & base ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    /* ─── Card ─────────────────────────────────────────────────────────── */
    .card {
      background: #1e293b;
      border-radius: 1rem;
      padding: 2rem;
      width: 100%;
      max-width: 720px;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #f8fafc;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    /* ─── Status bar ────────────────────────────────────────────────────── */
    .meta-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      font-size: .85rem;
      color: #94a3b8;
    }
    .meta-row span { display: flex; align-items: center; gap: .25rem; }
    .badge {
      background: #334155;
      border-radius: .375rem;
      padding: .15rem .5rem;
      font-weight: 600;
      color: #7dd3fc;
    }

    /* ─── Transcript box ────────────────────────────────────────────────── */
    #transcript-box {
      position: relative;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: .75rem;
      padding: 1rem 1rem 2.5rem;
      min-height: 140px;
      font-size: 1rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: #f1f5f9;
      margin-bottom: 1.25rem;
    }
    #transcript-box.placeholder { color: #475569; font-style: italic; }

    #copy-btn {
      position: absolute;
      bottom: .6rem;
      right: .6rem;
      background: #334155;
      border: none;
      border-radius: .5rem;
      padding: .3rem .75rem;
      color: #94a3b8;
      font-size: .8rem;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    #copy-btn:hover { background: #475569; color: #e2e8f0; }
    #copy-btn.copied { background: #166534; color: #bbf7d0; }

    /* ─── Controls row ──────────────────────────────────────────────────── */
    .controls { display: flex; gap: .75rem; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; }

    #record-btn {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .65rem 1.4rem;
      border: none;
      border-radius: 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
      background: #3b82f6;
      color: #fff;
    }
    #record-btn:hover { background: #2563eb; }
    #record-btn.recording { background: #ef4444; animation: pulse 1.2s ease-in-out infinite; }
    #record-btn:disabled { background: #475569; cursor: not-allowed; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.5); }
      50%       { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
    }

    #dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; }

    /* ─── Translation section ───────────────────────────────────────────── */
    .section-title {
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #64748b;
      margin-bottom: .5rem;
    }

    .translate-row {
      display: flex;
      gap: .75rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    select#lang-select {
      background: #334155;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: .5rem;
      padding: .45rem .75rem;
      font-size: .9rem;
      cursor: pointer;
      flex: 1;
      min-width: 180px;
    }
    select#lang-select:focus { outline: 2px solid #3b82f6; outline-offset: 1px; }

    #translate-btn {
      background: #0ea5e9;
      color: #fff;
      border: none;
      border-radius: .5rem;
      padding: .45rem 1.1rem;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }
    #translate-btn:hover { background: #0284c7; }
    #translate-btn:disabled { background: #475569; cursor: not-allowed; }

    #translated-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: .75rem;
      padding: .85rem 1rem;
      min-height: 80px;
      font-size: 1rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: #f1f5f9;
    }
    #translated-box.placeholder { color: #475569; font-style: italic; }

    /* ─── Spinner ───────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: .35rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Mode toggle ───────────────────────────────────────────────────── */
    .mode-toggle {
      display: inline-flex;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: .6rem;
      padding: .2rem;
      margin-bottom: 1rem;
      gap: .2rem;
    }
    .mode-toggle button {
      background: transparent;
      border: none;
      color: #94a3b8;
      padding: .4rem .9rem;
      font-size: .85rem;
      font-weight: 600;
      border-radius: .45rem;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .mode-toggle button.active { background: #3b82f6; color: #fff; }

    /* Live partial (uncommitted) transcript tail */
    .partial { color: #64748b; }
    .cursor-blink { animation: blink 1s step-start infinite; color: #38bdf8; }
    @keyframes blink { 50% { opacity: 0; } }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="card">
  <h1>🎙️ Speech to Text</h1>

  <!-- Mode toggle -->
  <div class="mode-toggle" role="tablist" aria-label="Transcription mode">
    <button id="mode-live" class="active" role="tab" aria-selected="true">⚡ Live dictation</button>
    <button id="mode-batch" role="tab" aria-selected="false">📁 Record &amp; upload</button>
  </div>

  <!-- Meta info row -->
  <div class="meta-row">
    <span>Language detected: <span class="badge" id="lang-badge">—</span></span>
    <span>Elapsed: <span class="badge" id="elapsed-badge">—</span></span>
  </div>

  <!-- Transcript output -->
  <div id="transcript-box" class="placeholder" role="status" aria-live="polite">
    Press "Start Recording" and speak…
    <button id="copy-btn" title="Copy transcript" aria-label="Copy transcript">Copy</button>
  </div>

  <!-- Dictation language -->
  <div style="margin-bottom:.75rem;">
    <p class="section-title">Dictation language</p>
    <select id="dictation-lang" aria-label="Dictation language" style="background:#334155;color:#e2e8f0;border:1px solid #475569;border-radius:.5rem;padding:.45rem .75rem;font-size:.9rem;cursor:pointer;min-width:180px;">
      {% for code, label in dictation_languages.items() %}
      <option value="{{ code }}"{% if code == 'auto' %} selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- Recording controls -->
  <div class="controls">
    <button id="record-btn">
      <span id="dot"></span>
      <span id="btn-label">Start Recording</span>
    </button>
    <span id="spinner-stt" class="hidden"><span class="spinner"></span>Transcribing…</span>
    <span id="status-msg" style="font-size:.85rem;color:#94a3b8;"></span>
  </div>

  <!-- Translation section -->
  <div>
    <p class="section-title">Translate to</p>
    <div class="translate-row">
      <select id="lang-select" aria-label="Target language">
        {% for code, label in translation_targets.items() %}
        <option value="{{ code }}"{% if code == 'zh-CN' %} selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
      <button id="translate-btn" disabled>Translate</button>
      <span id="spinner-tr" class="hidden"><span class="spinner"></span>Translating…</span>
    </div>
    <div id="translated-box" class="placeholder" role="status" aria-live="polite">
      Translation will appear here…
    </div>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
let mediaRecorder = null;
let audioChunks   = [];
let isRecording   = false;
let mode          = 'live';          // 'live' | 'batch'

// Live-streaming state
let ws            = null;
let audioContext  = null;
let mediaStream   = null;
let workletNode   = null;
let committedText = '';
let partialText   = '';

// ─── DOM refs ────────────────────────────────────────────────────────────────
const recordBtn     = document.getElementById('record-btn');
const btnLabel      = document.getElementById('btn-label');
const transcriptBox = document.getElementById('transcript-box');
const copyBtn       = document.getElementById('copy-btn');
const langBadge     = document.getElementById('lang-badge');
const elapsedBadge  = document.getElementById('elapsed-badge');
const statusMsg     = document.getElementById('status-msg');
const spinnerStt    = document.getElementById('spinner-stt');
const langSelect    = document.getElementById('lang-select');
const translateBtn  = document.getElementById('translate-btn');
const translatedBox = document.getElementById('translated-box');
const spinnerTr     = document.getElementById('spinner-tr');
const dictationLang = document.getElementById('dictation-lang');
const modeLiveBtn   = document.getElementById('mode-live');
const modeBatchBtn  = document.getElementById('mode-batch');

// ─── Mode toggle ──────────────────────────────────────────────────────────────
function setMode(next) {
  if (isRecording || next === mode) return;
  mode = next;
  modeLiveBtn.classList.toggle('active', mode === 'live');
  modeBatchBtn.classList.toggle('active', mode === 'batch');
  modeLiveBtn.setAttribute('aria-selected', mode === 'live');
  modeBatchBtn.setAttribute('aria-selected', mode === 'batch');
  setStatus(mode === 'live' ? 'Live mode — transcribes as you speak.'
                            : 'Batch mode — records, then transcribes on stop.');
}
modeLiveBtn.addEventListener('click', () => setMode('live'));
modeBatchBtn.addEventListener('click', () => setMode('batch'));

// ─── Recording ───────────────────────────────────────────────────────────────
recordBtn.addEventListener('click', async () => {
  if (!isRecording) {
    if (mode === 'live') await startLive();
    else                 await startRecording();
  } else {
    if (mode === 'live') stopLive();
    else                 stopRecording();
  }
});

// ─── Live streaming (WebSocket + AudioWorklet) ────────────────────────────────
const WORKLET_SRC = `
class PCMProcessor extends AudioWorkletProcessor {
  constructor() { super(); this.buf = []; this.target = 2048; }
  process(inputs) {
    const ch = inputs[0] && inputs[0][0];
    if (ch) {
      for (let i = 0; i < ch.length; i++) this.buf.push(ch[i]);
      while (this.buf.length >= this.target) {
        const slice = this.buf.splice(0, this.target);
        const pcm = new Int16Array(slice.length);
        for (let i = 0; i < slice.length; i++) {
          let s = Math.max(-1, Math.min(1, slice[i]));
          pcm[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
        }
        this.port.postMessage(pcm.buffer, [pcm.buffer]);
      }
    }
    return true;
  }
}
registerProcessor('pcm-worklet', PCMProcessor);
`;

async function startLive() {
  try {
    committedText = '';
    partialText = '';
    transcriptBox.dataset.text = '';
    transcriptBox.classList.remove('placeholder');
    renderLive();
    translateBtn.disabled = true;
    langBadge.textContent = dictationLang.value === 'auto' ? 'detecting…' : dictationLang.value;
    elapsedBadge.textContent = 'live';

    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    // 16 kHz context → browser resamples the mic for us (Whisper wants 16 kHz).
    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    const blobUrl = URL.createObjectURL(new Blob([WORKLET_SRC], { type: 'application/javascript' }));
    await audioContext.audioWorklet.addModule(blobUrl);
    URL.revokeObjectURL(blobUrl);

    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws/stream`);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      ws.send(JSON.stringify({ language: dictationLang.value }));
      const source = audioContext.createMediaStreamSource(mediaStream);
      workletNode = new AudioWorkletNode(audioContext, 'pcm-worklet');
      workletNode.port.onmessage = e => {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(e.data);
      };
      source.connect(workletNode);
      // Drive the graph without echoing audio to the speakers.
      const sink = audioContext.createGain();
      sink.gain.value = 0;
      workletNode.connect(sink).connect(audioContext.destination);
    };

    ws.onmessage = ev => {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'partial') {
        partialText = msg.text || '';
      } else if (msg.type === 'final') {
        committedText = msg.committed || committedText;
        if (msg.done) partialText = '';
      } else if (msg.type === 'error') {
        setStatus('Stream error: ' + msg.message, true);
      }
      renderLive();
      transcriptBox.dataset.text = committedText;
      translateBtn.disabled = !committedText;
    };

    ws.onerror = () => setStatus('WebSocket error.', true);
    ws.onclose = () => { if (isRecording) stopLive(); };

    isRecording = true;
    recordBtn.classList.add('recording');
    btnLabel.textContent = 'Stop';
    setStatus('Listening…');
  } catch (err) {
    setStatus('Could not start live mode: ' + err.message, true);
    teardownLive();
  }
}

function stopLive() {
  isRecording = false;
  recordBtn.classList.remove('recording');
  btnLabel.textContent = 'Start Recording';
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'stop' }));
  }
  partialText = '';
  renderLive();
  elapsedBadge.textContent = '—';
  setStatus('Stopped.');
  // Give the server a moment to flush the final frame, then close.
  setTimeout(teardownLive, 1500);
}

function teardownLive() {
  if (workletNode) { try { workletNode.disconnect(); } catch (e) {} workletNode = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  if (audioContext) { audioContext.close().catch(() => {}); audioContext = null; }
  if (ws) { try { ws.close(); } catch (e) {} ws = null; }
}

function renderLive() {
  transcriptBox.classList.toggle('placeholder', !committedText && !partialText);
  if (!committedText && !partialText) {
    transcriptBox.textContent = 'Press "Start Recording" and speak…';
  } else {
    const sep = committedText && partialText ? ' ' : '';
    transcriptBox.innerHTML =
      escapeHtml(committedText) +
      (partialText ? `<span class="partial">${sep}${escapeHtml(partialText)}</span>` : '') +
      (isRecording ? '<span class="cursor-blink"> ▋</span>' : '');
  }
  transcriptBox.appendChild(copyBtn);
}

function escapeHtml(s) {
  return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = getSupportedMimeType();
    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    audioChunks = [];

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); sendAudio(); };

    mediaRecorder.start();
    isRecording = true;

    recordBtn.classList.add('recording');
    btnLabel.textContent = 'Stop Recording';
    setStatus('');
  } catch (err) {
    setStatus('Microphone access denied: ' + err.message, true);
  }
}

function stopRecording() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    recordBtn.classList.remove('recording');
    btnLabel.textContent = 'Start Recording';
  }
}

function getSupportedMimeType() {
  const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/ogg'];
  return types.find(t => MediaRecorder.isTypeSupported(t)) || '';
}

// ─── Transcription ───────────────────────────────────────────────────────────
async function sendAudio() {
  if (!audioChunks.length) return;

  const mimeType = mediaRecorder.mimeType || 'audio/webm';
  const ext = mimeType.includes('ogg') ? '.ogg' : '.webm';
  const blob = new Blob(audioChunks, { type: mimeType });
  const formData = new FormData();
  formData.append('audio', blob, 'recording' + ext);
  formData.append('language', dictationLang.value);

  recordBtn.disabled = true;
  spinnerStt.classList.remove('hidden');
  setStatus('');

  try {
    const res = await fetch('/transcribe', { method: 'POST', body: formData });
    const data = await res.json();

    if (data.error) {
      setStatus('Error: ' + data.error, true);
    } else {
      setTranscript(data.text || '(no speech detected)');
      langBadge.textContent = data.language || '—';
      elapsedBadge.textContent = data.elapsed != null ? data.elapsed + ' s' : '—';
      translateBtn.disabled = !data.text;
    }
  } catch (err) {
    setStatus('Request failed: ' + err.message, true);
  } finally {
    recordBtn.disabled = false;
    spinnerStt.classList.add('hidden');
  }
}

// ─── Copy ────────────────────────────────────────────────────────────────────
copyBtn.addEventListener('click', () => {
  const text = transcriptBox.dataset.text || '';
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    copyBtn.textContent = 'Copied!';
    copyBtn.classList.add('copied');
    setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 2000);
  });
});

// ─── Translation ─────────────────────────────────────────────────────────────
translateBtn.addEventListener('click', () => doTranslate());

async function doTranslate() {
  const text = transcriptBox.dataset.text || '';
  if (!text) return;

  const target = langSelect.value;
  translateBtn.disabled = true;
  spinnerTr.classList.remove('hidden');

  try {
    const res = await fetch('/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, target }),
    });
    const data = await res.json();

    if (data.error) {
      setTranslated('Translation error: ' + data.error, true);
    } else {
      setTranslated(data.translated || '');
    }
  } catch (err) {
    setTranslated('Request failed: ' + err.message, true);
  } finally {
    translateBtn.disabled = false;
    spinnerTr.classList.add('hidden');
  }
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function setTranscript(text) {
  transcriptBox.textContent = text;
  transcriptBox.dataset.text = text;
  transcriptBox.classList.remove('placeholder');
  transcriptBox.appendChild(copyBtn);  // keep copy btn inside
}

function setTranslated(text, isError = false) {
  translatedBox.textContent = text;
  translatedBox.classList.toggle('placeholder', isError);
}

function setStatus(msg, isError = false) {
  statusMsg.textContent = msg;
  statusMsg.style.color = isError ? '#f87171' : '#94a3b8';
}

// Initial hint
setStatus('Live mode — transcribes as you speak.');
</script>
</body>
</html>
